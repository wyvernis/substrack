<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — SubsTrack</title>
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <nav class="nav nav--dark">
    <div class="nav-logo" onclick="location.href='index.html'">substrack</div>
    <div class="nav-actions">
      <button class="ghost-link" onclick="location.href='login.html'">Sign In</button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-visual">
      <div class="auth-visual__bg"></div>
      <div class="auth-visual__text">
        <h1 class="hero-title" style="font-size: clamp(48px, 8vw, 120px); text-align: left;">Reset<br>access.</h1>
      </div>
    </div>

    <div class="auth-form-side">
      <div class="auth-form-container">
        <h1>Forgot Password</h1>
        <p class="auth-subtitle">Enter your email and we'll send reset instructions.</p>

        <form id="forgotPasswordForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="pill-btn pill-btn--graphite" style="width: 100%; padding: 14px;">Send Reset Link</button>
        </form>

        <p class="form-switch"><a href="login.html">← Back to Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      try {
        await App.api('/api/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email }),
        });
        App.toast('Reset link sent! Check your email.');
      } catch (err) {
        App.toast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
