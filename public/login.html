<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Sign In — SubsTrack</title>
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>

  <nav class="nav nav--dark">
    <div class="nav-logo" onclick="location.href='index.html'">substrack</div>
    <div class="nav-actions">
      <button class="ghost-link" onclick="location.href='register.html'">Sign Up</button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-visual">
      <div class="auth-visual__bg"></div>
      <div class="auth-visual__text">
        <h1 class="hero-title" style="font-size: clamp(48px, 8vw, 120px); text-align: left;">Welcome<br>back.</h1>
      </div>
    </div>

    <div class="auth-form-side">
      <div class="auth-form-container">
        <h1>Sign In</h1>
        <p class="auth-subtitle">Access your subscription dashboard.</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-input" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-input" id="password" placeholder="Your password" required autocomplete="current-password">
          </div>
          <button type="submit" class="pill-btn pill-btn--graphite" style="width: 100%; margin-top: var(--spacing-12); padding: 14px;">Sign In</button>
          <div class="form-footer">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" id="remember"> Remember me
            </label>
            <a href="forgot-password.html">Forgot password?</a>
          </div>
        </form>

        <p class="form-switch">Don't have an account? <a href="register.html">Sign Up</a></p>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const data = await App.api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        localStorage.setItem('token', data.token);
        App.toast('Welcome back!');
        setTimeout(() => { window.location.href = '/dashboard/dashboard.html'; }, 400);
      } catch (err) {
        App.toast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
