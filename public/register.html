<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — SubsTrack</title>
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>

  <nav class="nav nav--dark">
    <div class="nav-logo" onclick="location.href='index.html'">substrack</div>
    <div class="nav-actions">
      <button class="ghost-link" onclick="location.href='login.html'">Sign In</button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-visual">
      <div class="auth-visual__bg"></div>
      <div class="auth-visual__text">
        <h1 class="hero-title" style="font-size: clamp(48px, 8vw, 120px); text-align: left;">Start<br>tracking.</h1>
      </div>
    </div>

    <div class="auth-form-side">
      <div class="auth-form-container">
        <h1>Create Account</h1>
        <p class="auth-subtitle">Free forever. No credit card required.</p>

        <form id="registerForm">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" class="form-input" id="firstName" placeholder="Gayatri" required>
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" class="form-input" id="lastName" placeholder="Verma" required>
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-input" id="password" placeholder="Min. 6 characters" required minlength="6">
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat password" required>
          </div>
          <button type="submit" class="pill-btn pill-btn--graphite" style="width: 100%; margin-top: var(--spacing-12); padding: 14px;">Create Account</button>
        </form>

        <p class="form-switch">Already have an account? <a href="login.html">Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        App.toast('Passwords do not match', 'error');
        return;
      }

      try {
        const data = await App.api('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify({ firstName, lastName, email, password }),
        });
        localStorage.setItem('token', data.token);
        App.toast('Account created successfully!');
        setTimeout(() => { window.location.href = '/dashboard/dashboard.html'; }, 400);
      } catch (err) {
        App.toast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
