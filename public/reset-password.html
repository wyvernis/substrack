<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Reset Password - SubsTrack</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background-color: black;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-y: auto;
        }
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 110vh;
            background: rgba(39, 39, 39, 0.4);
        }
        .nav {
            position: fixed;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 80px;
            padding: 0 50px;
            background: linear-gradient(rgba(39, 39, 39, 0.8), transparent);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-logo p {
            color: white;
            font-size: 25px;
            font-weight: 600;
        }

        .nav-button {
            display: flex;
            gap: 15px;
        }

        .btn {
            width: 130px;
            height: 40px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: .3s ease;
            color: white;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn.white-btn {
            background: rgba(255, 255, 255, 0.7);
            color: #000;
        }
        .form-box {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 512px;
            height: 450px;
            overflow: hidden;
            z-index: 2;
        }
        .reset-container {
            position: absolute;
            width: 500px;
            display: flex;
            flex-direction: column;
            transition: .5s ease-in-out;
        }
        header {
            color: #fff;
            font-size: 30px;
            text-align: center;
            padding: 10px 0 30px 0;
        }
        .description {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.6;
        }
        .input-field {
            font-size: 15px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            height: 50px;
            width: 100%;
            padding: 0 10px 0 45px;
            border: none;
            border-radius: 30px;
            outline: none;
            transition: .2s ease;
            margin-bottom: 15px;
        }
        .input-field:hover, .input-field:focus {
            background: rgba(255, 255, 255, 0.25);
        }
        ::-webkit-input-placeholder {
            color: #fff;
        }
        .input-box {
            position: relative;
            margin-bottom: 15px;
        }
        .input-box i {
            position: absolute;
            top: 15px;
            left: 17px;
            color: #fff;
        }
        .submit {
            font-size: 15px;
            font-weight: 500;
            color: black;
            height: 45px;
            width: 100%;
            border: none;
            border-radius: 30px;
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: .3s ease-in-out;
        }
        .submit:hover {
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 1px 5px 7px 1px rgba(0, 0, 0, 0.2);
        }
        .password-requirements {
            color: #fff;
            font-size: 12px;
            margin: 10px 0 20px;
            padding: 0 10px;
        }
        .password-requirements ul {
            list-style: none;
        }
        .password-requirements li {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .password-requirements i {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        @media only screen and (max-width: 540px) {
            .wrapper {
                min-height: 100vh;
            }
            .form-box {
                width: 100%;
                height: 500px;
            }
            .reset-container {
                width: 100%;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo">
            <p onclick="location.href='index.html'">SubsTrack.</p>
        </div>
        <div class="nav-button">
            <button class="btn white-btn" id="loginBtn" onclick="location.href='login.html'">Sign In</button>
            <button class="btn" id="registerBtn" onclick="location.href='register.html'">Sign Up</button>
        </div>
    </nav>

    <div class="wrapper">
        <div class="form-box">
            <div class="reset-container">
                <header>Reset Password</header>
                <p class="description">Create a new password for your account</p>
                <form id="resetPasswordForm">
                    <div class="input-box">
                        <input type="password" class="input-field" placeholder="New Password" required>
                        <i class='bx bx-lock-alt'></i>
                    </div>
                    
                    <div class="input-box">
                        <input type="password" class="input-field" placeholder="Confirm New Password" required>
                        <i class='bx bx-lock-alt'></i>
                    </div>

                    <div class="password-requirements">
                        <ul>
                            <li><i class='bx bx-check-circle'></i>At least 8 characters</li>
                            <li><i class='bx bx-check-circle'></i>Include uppercase & lowercase letters</li>
                            <li><i class='bx bx-check-circle'></i>Include at least one number</li>
                            <li><i class='bx bx-check-circle'></i>Include at least one special character</li>
                        </ul>
                    </div>
                    
                    <button type="submit" class="submit">Reset Password</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Add your reset password logic here
            console.log('Password reset attempted');
        });
    </script>
</body>
</html>
