<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Reset Password — SubsTrack</title>
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <nav class="nav nav--dark">
    <div class="nav-logo" onclick="location.href='index.html'">substrack</div>
    <div class="nav-actions">
      <button class="ghost-link" onclick="location.href='login.html'">Sign In</button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-visual">
      <div class="auth-visual__bg"></div>
      <div class="auth-visual__text">
        <h1 class="hero-title" style="font-size: clamp(48px, 8vw, 120px); text-align: left;">New<br>password.</h1>
      </div>
    </div>

    <div class="auth-form-side">
      <div class="auth-form-container">
        <h1>Reset Password</h1>
        <p class="auth-subtitle">Create a new password for your account.</p>

        <form id="resetPasswordForm">
          <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" class="form-input" id="password" placeholder="Min. 6 characters" required minlength="6">
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat password" required>
          </div>
          <button type="submit" class="pill-btn pill-btn--graphite" style="width: 100%; padding: 14px;">Reset Password</button>
        </form>

        <p class="form-switch"><a href="login.html">← Back to Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        App.toast('Passwords do not match', 'error');
        return;
      }

      if (!token) {
        App.toast('Invalid reset link', 'error');
        return;
      }

      try {
        await App.api(`/api/auth/reset-password/${token}`, {
          method: 'POST',
          body: JSON.stringify({ password }),
        });
        App.toast('Password reset successfully!');
        setTimeout(() => { window.location.href = '/login.html'; }, 800);
      } catch (err) {
        App.toast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
